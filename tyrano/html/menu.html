<div id="menu_menu_wrapper" class="menu_overlay">
    <div class="display_menu block_menu menu_panel">
        <div class="menu_panel_header">
            <h2>音量設定</h2>
            <button type="button" class="menu_close" aria-label="メニューを閉じる">×</button>
        </div>

        <div class="menu_panel_body">
            <label class="menu_volume_row" for="menu_bgm_volume">
                <span>BGM</span>
                <input id="menu_bgm_volume" class="menu_volume_slider" type="range" min="0" max="100" value="80" />
                <span class="menu_volume_value">80%</span>
            </label>

            <label class="menu_volume_row" for="menu_se_volume">
                <span>SE</span>
                <input id="menu_se_volume" class="menu_volume_slider" type="range" min="0" max="100" value="80" />
                <span class="menu_volume_value">80%</span>
            </label>
        </div>

        <div class="menu_panel_footer">
            <button type="button" class="menu_window_close">閉じる</button>
        </div>
    </div>

    <script>
        (function () {
            const kag = TYRANO && TYRANO.kag ? TYRANO.kag : null;
            const wrapper = $("#menu_menu_wrapper");
            const bgmInput = wrapper.find("#menu_bgm_volume");
            const seInput = wrapper.find("#menu_se_volume");
            const bgmValue = wrapper.find(".menu_volume_value").eq(0);
            const seValue = wrapper.find(".menu_volume_value").eq(1);

            const setValueLabel = function (input, label) {
                label.text(input.val() + "%");
            };

            const applyVolume = function (type, value) {
                if (!kag || !kag.ftag || !kag.ftag.startTag) {
                    return;
                }
                const tagName = type === "bgm" ? "bgmopt" : "seopt";
                kag.ftag.startTag(tagName, { volume: String(value) });
            };

            const initFromConfig = function () {
                const bgm = parseInt(kag && kag.config && kag.config.defaultBgmVolume ? kag.config.defaultBgmVolume : 80, 10);
                const se = parseInt(kag && kag.config && kag.config.defaultSeVolume ? kag.config.defaultSeVolume : 80, 10);
                bgmInput.val(isNaN(bgm) ? 80 : bgm);
                seInput.val(isNaN(se) ? 80 : se);
                setValueLabel(bgmInput, bgmValue);
                setValueLabel(seInput, seValue);
            };

            bgmInput.on("input", function () {
                const value = parseInt($(this).val(), 10);
                setValueLabel($(this), bgmValue);
                applyVolume("bgm", value);
            });

            seInput.on("input", function () {
                const value = parseInt($(this).val(), 10);
                setValueLabel($(this), seValue);
                applyVolume("se", value);
            });

            wrapper.find(".menu_close, .menu_window_close").on("click", function (event) {
                event.stopPropagation();
                const menuLayer = kag && kag.layer ? kag.layer.getMenuLayer() : null;
                if (menuLayer) {
                    menuLayer.hide().empty();
                    $(".button_menu").show();
                }
            });

            initFromConfig();
        })();
    </script>
</div>
